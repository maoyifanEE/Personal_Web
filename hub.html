<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">

  <body data-page="hub">
    <main class="private-page hub-page" aria-labelledby="page-title">

        <div class="private-mark" aria-hidden="true">

          当前尚未实现真实登录、身份验证或权限保护。请不要在这里存放私人数据。
        </p>

        <div class="hub-grid" aria-label="Future app placeholders">
          <article class="app-card">
            <p class="card-status">占位</p>
            <h2>App 01</h2>
            <p>后续分支再决定具体子应用内容。</p>
          </article>
          <article class="app-card">
            <p class="card-status">V1 原型</p>
            <h2>健康管理</h2>
            <p>管理健康饮食、运动打卡和放纵警告，当前仅使用本机浏览器保存数据。</p>
            <a class="card-link" href="./apps/health/index.html">进入健康管理</a>
          </article>
          <article class="app-card">
            <p class="card-status">占位</p>
            <h2>App 03</h2>
            <p>后续分支再决定具体子应用内容。</p>
          </article>
        </div>

        <div class="private-actions">
          <a class="secondary-action" href="./login.html">返回私人入口</a>
          <a class="secondary-action" href="./index.html">返回公开首页</a>
        </div>
      </section>
    </main>
  </body>
</html>
