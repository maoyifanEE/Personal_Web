<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Static mock private entrance for the Personal_Web private hub preview."
    >
    <title>Private Entrance</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script src="./auth.js" defer></script>
    <script src="./login.js" defer></script>
  </head>
  <body data-page="login">
    <main class="private-page login-page" aria-labelledby="login-title">
      <section class="private-panel entrance-panel login-card">
        <h1 id="login-title">Private Entrance</h1>

        <form class="login-form" data-login-form novalidate>
          <div class="login-field">
            <label class="login-label" for="login-account">Account or email</label>
            <input
              class="login-input"
              id="login-account"
              name="account"
              type="text"
              autocomplete="username"
              data-login-account
            >
          </div>

          <div class="login-field">
            <label class="login-label" for="login-password">Password</label>
            <input
              class="login-input"
              id="login-password"
              name="password"
              type="password"
              autocomplete="current-password"
              data-login-password
            >
          </div>

          <p class="login-error" role="alert" aria-live="polite" data-login-error></p>

          <button class="primary-action login-submit" type="submit" data-login-submit>Enter</button>
        </form>

        <a class="login-back-link" href="./index.html">Back to homepage</a>
      </section>
    </main>
  </body>
</html>
