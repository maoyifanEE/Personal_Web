<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAO Yifan - Personal_Web</title>
    <meta
      name="description"
      content="Hello, World! Welcome to MAO Yifan’s corner of the web. More is on the way."
    >
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="hero" aria-labelledby="page-title">
      <section class="hero-copy" aria-label="Homepage introduction">
        <h1 id="page-title">Hello, <span>World!</span></h1>
        <p>Welcome to MAO Yifan’s corner of the web.</p>
        <p>More is on the way.</p>
      </section>

      <a
        class="user-entrance visible-entrance visible-entrance--user"
        href="./login.html"
        aria-label="Open user entrance"
      >用户入口</a>
      <a
        class="visitor-entrance visible-entrance visible-entrance--visitor"
        href="./journey.html"
        aria-label="Open visitor entrance"
      >访客入口</a>
    </main>

    <div class="floating-tools" aria-label="Floating website tools">
      <button
        class="floating-tool-button"
        type="button"
        data-message-open
        aria-haspopup="dialog"
        aria-controls="visitor-message-modal"
      >留言</button>
    </div>

    <div
      class="visitor-message-modal"
      id="visitor-message-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="visitor-message-title"
      hidden
    >
      <div class="visitor-message-modal__overlay" data-message-close></div>
      <section class="visitor-message-modal__panel" tabindex="-1">
        <button
          class="visitor-message-modal__close"
          type="button"
          data-message-close
          aria-label="关闭留言窗口"
        >&times;</button>
        <p class="visitor-message-modal__eyebrow">Prototype</p>
        <h2 id="visitor-message-title">留言</h2>
        <p class="visitor-message-notice">
          当前仅为前端原型，真实留言提交需要后端和数据库支持。
        </p>
        <form class="visitor-message-form" data-message-form novalidate>
          <label>
            <span>昵称</span>
            <input name="nickname" type="text" autocomplete="name" required>
          </label>
          <label>
            <span>联系方式（可选）</span>
            <input name="contact" type="text" autocomplete="email">
          </label>
          <label>
            <span>留言内容</span>
            <textarea name="message" rows="5" required></textarea>
          </label>
          <p class="visitor-message-status" data-message-status aria-live="polite">
            原型模式：留言不会被保存。
          </p>
          <button class="visitor-message-submit" type="submit">提交留言（原型）</button>
        </form>
      </section>
    </div>
    <footer class="site-footer" aria-label="Site filing information">
      <!-- TODO: Add the public security filing number after 公安联网备案 approval. -->
      <a
        href="https://beian.miit.gov.cn/"
        target="_blank"
        rel="noopener noreferrer"
      >&#36195;ICP&#22791;2026013131&#21495;-1</a>
    </footer>
  </body>
</html>
