<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal_Web Debug Log</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script src="./debug-logger.js" defer></script>
    <script src="./auth.js" defer></script>
    <script src="./debug-log.js" defer></script>
  </head>
  <body data-page="debug-log">
    <main class="private-page debug-log-page" aria-labelledby="debug-log-title">
      <section class="private-panel debug-log-panel">
        <p class="status-badge">本地调试</p>
        <h1 id="debug-log-title">前端调试日志</h1>
        <p class="private-copy">
          这里仅显示当前浏览器保存的本地调试日志。日志会脱敏密码、token、cookie、CSRF 和 Data URL。
        </p>

        <div class="debug-log-actions">
          <button class="primary-action" type="button" data-debug-action="refresh">刷新</button>
          <button class="secondary-action" type="button" data-debug-action="export">导出 JSON</button>
          <button class="secondary-action" type="button" data-debug-action="send">发送到本地后端</button>
          <button class="secondary-action danger-button" type="button" data-debug-action="clear">清空本地日志</button>
        </div>

        <p class="debug-log-status" data-debug-status aria-live="polite">正在读取日志...</p>
        <pre class="debug-log-output" data-debug-output></pre>

        <div class="private-actions">
          <a class="secondary-action" href="./index.html">返回首页</a>
          <a class="secondary-action" href="./hub.html">返回 Hub</a>
        </div>
      </section>
    </main>
  </body>
</html>
